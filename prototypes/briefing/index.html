<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prototype B · The Briefing — Russian Losses in Ukraine</title>
<meta name="description" content="A daily, readable briefing on Russian personnel and equipment losses in Ukraine, compiled from official reports of the Ministry of Defence of Ukraine.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,700;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --serif: "Newsreader", Georgia, serif;
    --sans: "Inter", system-ui, sans-serif;
  }
  [data-theme="light"] {
    --bg: #faf8f4;
    --surface: #ffffff;
    --border: #e4ded2;
    --rule: #1d2733;
    --text: #1d2733;
    --text-2: #62708200;
    --text-2: #5f6b7d;
    --accent: #0f4fa8;
    --gold: #a87e00;
    --up: #b4530a;
    --chart-accent: #0f4fa8;
    --chart-accent2: #c2410c;
    --chart-grid: #e4ded2;
    --chart-text: #8b95a5;
    color-scheme: light;
  }
  [data-theme="dark"] {
    --bg: #14181f;
    --surface: #1b2029;
    --border: #2c3442;
    --rule: #e8e4da;
    --text: #ece9e2;
    --text-2: #9aa4b4;
    --accent: #7aa7e8;
    --gold: #e5c04b;
    --up: #e8945a;
    --chart-accent: #7aa7e8;
    --chart-accent2: #e8945a;
    --chart-grid: #2c344288;
    --chart-text: #7e8899;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 16.5px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration-thickness: 1px; text-underline-offset: 2.5px; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 22px; }
  .wrap-wide { max-width: 1060px; margin: 0 auto; padding: 0 22px; }

  /* ---------- masthead ---------- */
  .topbar { border-bottom: 1px solid var(--border); font-size: 13px; }
  .topbar-inner { display: flex; align-items: center; gap: 12px; height: 44px; color: var(--text-2); }
  .topbar .spacer { flex: 1; }
  select.lang {
    appearance: none; background: transparent; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 24px 4px 8px;
    font: 500 12.5px var(--sans); cursor: pointer;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="%23888" stroke-width="1.5" stroke-linecap="round"/></svg>');
    background-repeat: no-repeat; background-position: right 7px center;
  }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  [data-theme="dark"] .only-dark { display: none; }
  [data-theme="light"] .only-light { display: none; }

  .masthead { text-align: center; padding: 40px 0 26px; }
  .masthead .flag-rule { width: 72px; height: 6px; margin: 0 auto 22px; display: flex; border-radius: 2px; overflow: hidden; }
  .masthead .flag-rule i { flex: 1; } .flag-rule i:first-child { background: #0057b7; } .flag-rule i:last-child { background: #ffd700; }
  h1.mast {
    font-family: var(--serif); font-weight: 700; letter-spacing: -.015em;
    font-size: clamp(34px, 6vw, 58px); line-height: 1.05; margin: 0 0 14px;
  }
  .mast-sub { color: var(--text-2); max-width: 62ch; margin: 0 auto; font-size: 16px; }
  .dateline {
    margin: 22px auto 0; font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-2); display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .dateline::before, .dateline::after { content: ""; height: 1px; width: 64px; background: var(--border); }

  /* ---------- lede ---------- */
  .lede {
    font-family: var(--serif); font-size: clamp(21px, 3vw, 27px); line-height: 1.5;
    padding: 34px 0 10px; letter-spacing: -.005em;
  }
  .lede strong { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .lede .gold { color: var(--gold); }
  .byline { color: var(--text-2); font-size: 14px; padding-bottom: 10px; }
  .byline a { color: inherit; }

  /* ---------- briefing table ---------- */
  section { padding: 30px 0; }
  h2.sec {
    font-family: var(--serif); font-size: clamp(24px, 3.4vw, 32px); font-weight: 700;
    margin: 0 0 6px; letter-spacing: -.01em;
  }
  .sec-rule { border: 0; border-top: 3px solid var(--rule); margin: 0 0 4px; width: 56px; }
  .sec-note { color: var(--text-2); font-size: 14px; margin: 0 0 18px; }
  table.brief { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  table.brief th {
    text-align: left; font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-2); font-weight: 600; padding: 8px 10px; border-bottom: 2px solid var(--rule);
  }
  table.brief th.num, table.brief td.num { text-align: right; }
  table.brief td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 15.5px; }
  table.brief td.cat { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  table.brief td.cat .ic { color: var(--accent); flex: none; }
  table.brief td.total { font-weight: 700; font-size: 16px; }
  table.brief td.chg { color: var(--up); font-weight: 600; white-space: nowrap; }
  table.brief td.chg.zero { color: var(--text-2); font-weight: 500; }
  table.brief tr:hover td { background: color-mix(in srgb, var(--accent) 4%, transparent); }
  .table-scroll { overflow-x: auto; }

  /* ---------- chart panel ---------- */
  .chart-card { border-top: 3px solid var(--rule); padding-top: 16px; }
  .chart-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 4px 0 14px; }
  .chart-controls .spacer { flex: 1; }
  select.picker {
    appearance: none; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 30px 7px 12px;
    font: 600 14px var(--sans); cursor: pointer;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="%23888" stroke-width="1.5" stroke-linecap="round"/></svg>');
    background-repeat: no-repeat; background-position: right 10px center;
  }
  .pills { display: inline-flex; gap: 6px; }
  .pills button {
    border: 1px solid var(--border); background: transparent; color: var(--text-2);
    font: 600 13px var(--sans); padding: 6px 13px; border-radius: 999px; cursor: pointer;
  }
  .pills button[aria-pressed="true"] { background: var(--text); color: var(--bg); border-color: var(--text); }
  .chart-tip {
    position: absolute; pointer-events: none; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px;
    box-shadow: 0 6px 18px rgb(0 0 0 / .12); font-size: 12.5px; display: flex; flex-direction: column;
  }
  .chart-tip strong { font-size: 14px; }
  .chart-tip span { color: var(--text-2); }

  /* ---------- milestones ---------- */
  .miles { list-style: none; margin: 0; padding: 0; border-left: 2px solid var(--border); }
  .miles li { position: relative; padding: 0 0 22px 26px; }
  .miles li::before {
    content: ""; position: absolute; left: -7px; top: 6px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--bg); border: 3px solid var(--accent);
  }
  .miles .m-what { font-family: var(--serif); font-size: 19px; font-weight: 700; }
  .miles .m-what b { color: var(--accent); font-variant-numeric: tabular-nums; }
  .miles .m-when { color: var(--text-2); font-size: 13.5px; }

  /* ---------- resources ---------- */
  .res-list { display: grid; gap: 0; }
  .res-item {
    display: flex; gap: 16px; align-items: baseline; padding: 15px 4px;
    border-bottom: 1px solid var(--border); color: inherit; text-decoration: none;
  }
  .res-item:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
  .res-item b { font-family: var(--serif); font-size: 19px; white-space: nowrap; color: var(--accent); }
  .res-item p { margin: 0; color: var(--text-2); font-size: 14.5px; }

  footer.site { border-top: 3px solid var(--rule); margin-top: 26px; padding: 28px 0 48px; font-size: 14px; color: var(--text-2); }
  footer.site .cols { display: grid; grid-template-columns: 1.6fr 1fr; gap: 28px; }
  footer.site h3 { font-family: var(--serif); color: var(--text); margin: 0 0 8px; font-size: 17px; }
  footer.site ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; }
  @media (max-width: 720px) {
    footer.site .cols { grid-template-columns: 1fr; }
    table.brief .hide-sm { display: none; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="wrap-wide topbar-inner">
    <span id="topDay"></span>
    <div class="spacer"></div>
    <select class="lang" id="langSel" aria-label="Language"></select>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <span class="only-dark" id="sunIc"></span>
      <span class="only-light" id="moonIc"></span>
    </button>
    <a class="icon-btn" href="https://github.com/lod-db/orc-losses" aria-label="GitHub" id="ghBtn"></a>
  </div>
</div>

<header class="masthead wrap">
  <div class="flag-rule"><i></i><i></i></div>
  <h1 class="mast" data-i18n="title">Russian Losses in Ukraine</h1>
  <p class="mast-sub" id="mastSub"></p>
  <p class="dateline" id="dateline"></p>
</header>

<main>
  <div class="wrap">
    <p class="lede" id="lede"></p>
    <p class="byline" id="byline"></p>
  </div>

  <section class="wrap">
    <h2 class="sec" id="briefTitle"></h2>
    <hr class="sec-rule">
    <p class="sec-note" id="briefNote"></p>
    <div class="table-scroll">
      <table class="brief" id="briefTable"></table>
    </div>
  </section>

  <section class="wrap-wide">
    <div class="chart-card">
      <h2 class="sec" id="chartTitle"></h2>
      <div class="chart-controls">
        <select class="picker" id="catPicker"></select>
        <div class="pills" id="modePills"></div>
        <div class="spacer"></div>
        <div class="pills" id="rangePills"></div>
      </div>
      <div id="mainChart"></div>
    </div>
  </section>

  <section class="wrap">
    <h2 class="sec" id="milesTitle"></h2>
    <hr class="sec-rule">
    <p class="sec-note" id="milesNote"></p>
    <ul class="miles" id="milesList"></ul>
  </section>

  <section class="wrap">
    <h2 class="sec" id="resTitle"></h2>
    <hr class="sec-rule">
    <p class="sec-note" id="resIntro"></p>
    <div class="res-list" id="resList"></div>
  </section>
</main>

<footer class="site">
  <div class="wrap cols">
    <div>
      <h3 id="footSrcTitle"></h3>
      <p id="footDisclaimer"></p>
    </div>
    <div>
      <h3 id="footLinksTitle"></h3>
      <ul id="footLinks"></ul>
    </div>
  </div>
</footer>

<script src="../shared/i18n.js"></script>
<script src="../shared/theme.js"></script>
<script src="../shared/icons.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/charts.js"></script>
<script>
"use strict";
initTheme("light"); // editorial is light-first
document.documentElement.lang = CURRENT_LANG;

document.getElementById("sunIc").innerHTML = icon("sun", 16);
document.getElementById("moonIc").innerHTML = icon("moon", 16);
document.getElementById("ghBtn").innerHTML = icon("github", 16);
wireThemeToggle(document.getElementById("themeBtn"));
buildLangSelect(document.getElementById("langSel"));

const ORDER = [
  "personnel","tanks","afvs","artillery","rocketSystems","airDefense",
  "fixedWingAircraft","rotaryWingAircraft","uavs","missiles","ships",
  "submarines","unarmoredVehicles","specialEquipment",
];
const MILESTONE_DEFS = [
  { key: "personnel", value: 1000000 },
  { key: "personnel", value: 500000 },
  { key: "tanks", value: 10000 },
  { key: "uavs", value: 250000 },
  { key: "artillery", value: 30000 },
  { key: "fixedWingAircraft", value: 400 },
];
const RESOURCES = [
  { name: "DeepStateMap", url: "https://deepstatemap.live", tKey: "resDeepstate" },
  { name: "Oryx", url: "https://www.oryxspioenkop.com", tKey: "resOryx" },
  { name: "Ukraine Oversight", url: "https://www.ukraineoversight.gov", tKey: "resOversight" },
  { name: "war.ukraine.ua", url: "https://war.ukraine.ua", tKey: "resUkraine" },
  { name: "mod.gov.ua", url: "https://mod.gov.ua", tKey: "resMod" },
];

let STATS, selKey = "personnel", selMode = "cum", selRange = "all";

function renderHead() {
  applyI18nAttrs();
  document.getElementById("topDay").textContent = t("dayOfWar", { n: fmtNum(STATS.dayOfWar) });
  document.getElementById("mastSub").textContent = t("tagline");
  document.getElementById("dateline").textContent = fmtDate(STATS.latest.date, "full");
  const p = STATS.cats.personnel;
  const dateStr = fmtDate(STATS.latest.date);
  document.getElementById("lede").innerHTML =
    `${t("preamble1")} <strong>${fmtNum(p.total)}</strong> ${t("preamble2")} ` +
    `<strong class="gold">${fmtNum(STATS.equipmentTotal)}</strong> ${t("preamble3")} ` +
    `${dateStr}${dateStr.endsWith(".") ? "" : "."}`;
  document.getElementById("byline").innerHTML =
    `${t("sourceMod")} · <a href="${STATS.latest.sourceUri}" target="_blank" rel="noopener">${t("viewData")}</a>`;
}

function renderTable() {
  document.getElementById("briefTitle").textContent = t("briefingKicker");
  document.getElementById("briefNote").textContent = t("noteToday") + " · " + fmtDate(STATS.latest.date);
  const tbl = document.getElementById("briefTable");
  let html = `<thead><tr>
    <th>${t("tableCategory")}</th>
    <th class="num">${t("total")}</th>
    <th class="num">${t("today")}</th>
    <th class="num hide-sm">${t("past7")}</th>
    <th class="num hide-sm">${t("past30")}</th>
  </tr></thead><tbody>`;
  for (const key of ORDER) {
    const c = STATS.cats[key];
    const chg = (v) => v == null ? "—" : v > 0 ? "+" + fmtNum(v) : "±0";
    html += `<tr>
      <td class="cat">${icon(c.icon, 21)}${t(key)}</td>
      <td class="num total">${fmtNum(c.total)}</td>
      <td class="num chg ${c.d1 ? "" : "zero"}">${chg(c.d1)}</td>
      <td class="num chg hide-sm ${c.d7 ? "" : "zero"}">${chg(c.d7)}</td>
      <td class="num chg hide-sm ${c.d30 ? "" : "zero"}">${chg(c.d30)}</td>
    </tr>`;
  }
  tbl.innerHTML = html + "</tbody>";
}

function pills(el, options, current, onPick) {
  el.innerHTML = "";
  for (const [val, label] of options) {
    const b = document.createElement("button");
    b.textContent = label;
    b.setAttribute("aria-pressed", val === current ? "true" : "false");
    b.addEventListener("click", () => onPick(val));
    el.appendChild(b);
  }
}

function renderChart() {
  document.getElementById("chartTitle").textContent =
    selMode === "cum" ? t("totalLosses") : t("dailyLosses");
  const picker = document.getElementById("catPicker");
  picker.innerHTML = "";
  for (const key of ORDER) {
    const o = document.createElement("option");
    o.value = key; o.textContent = t(key);
    if (key === selKey) o.selected = true;
    picker.appendChild(o);
  }
  picker.onchange = () => { selKey = picker.value; renderChart(); };
  pills(document.getElementById("modePills"),
    [["cum", t("cumulative")], ["daily", t("daily")]], selMode,
    (v) => { selMode = v; renderChart(); });
  pills(document.getElementById("rangePills"),
    [["30", t("range30")], ["90", t("range90")], ["1y", t("range1y")], ["all", t("rangeAll")]], selRange,
    (v) => { selRange = v; renderChart(); });
  const box = document.getElementById("mainChart");
  if (selMode === "cum") areaChart(box, sliceRange(STATS.series(selKey), selRange), { height: 340 });
  else barChart(box, sliceRange(STATS.dailySeries(selKey), selRange), { height: 300 });
}

function renderMilestones() {
  document.getElementById("milesTitle").textContent = t("milestones");
  document.getElementById("milesNote").textContent = t("sourceMod");
  const list = document.getElementById("milesList");
  list.innerHTML = "";
  const items = [];
  for (const m of MILESTONE_DEFS) {
    const date = STATS.crossing(m.key, m.value);
    if (date) items.push({ ...m, date });
  }
  items.sort((a, b) => (a.date < b.date ? 1 : -1));
  for (const m of items) {
    const li = document.createElement("li");
    li.innerHTML = `
      <div class="m-what">${t(m.key)}: <b>${fmtNum(m.value)}</b> ${t("passed")}</div>
      <div class="m-when">${t("on")} ${fmtDate(m.date)}</div>`;
    list.appendChild(li);
  }
}

function renderResources() {
  document.getElementById("resTitle").textContent = t("resources");
  document.getElementById("resIntro").textContent = t("resourcesIntro");
  const list = document.getElementById("resList");
  list.innerHTML = "";
  for (const r of RESOURCES) {
    const a = document.createElement("a");
    a.className = "res-item"; a.href = r.url; a.target = "_blank"; a.rel = "noopener";
    a.innerHTML = `<b>${r.name}</b><p>${t(r.tKey)}</p>`;
    list.appendChild(a);
  }
  document.getElementById("footSrcTitle").textContent = t("sources");
  document.getElementById("footDisclaimer").textContent = t("disclaimer");
  document.getElementById("footLinksTitle").textContent = t("openData");
  document.getElementById("footLinks").innerHTML = `
    <li><a href="https://github.com/lod-db/orc-losses" target="_blank" rel="noopener">github.com/lod-db/orc-losses</a></li>
    <li><a href="https://mod.gov.ua" target="_blank" rel="noopener">${t("sourceMod")}</a></li>`;
}

document.addEventListener("themechange", () => renderChart());

loadLossData("../../russian-losses.json").then((stats) => {
  STATS = stats;
  renderHead(); renderTable(); renderChart(); renderMilestones(); renderResources();
});
</script>
</body>
</html>
